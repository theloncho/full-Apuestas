openapi: 3.0.3
info:
  title: FairBet Lab API
  version: 1.0.0
  description: Plataforma educativa de apuestas deportivas con moneda virtual.
paths:
  /api/bets/:
    get:
      operationId: bets_list
      description: Get the authenticated user's recent bets.
      tags:
      - Betting
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Bet'
          description: ''
  /api/events/:
    get:
      operationId: events_list
      description: List all scheduled and live events.
      tags:
      - Betting
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
          description: ''
  /api/events/{event_id}/liquidate/:
    post:
      operationId: events_liquidate_create
      description: 'Admin: Liquidate an event by setting the final score.'
      parameters:
      - in: path
        name: event_id
        schema:
          type: integer
        required: true
      tags:
      - Admin Betting
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LiquidateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LiquidateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LiquidateRequest'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiquidateResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '404':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/events/{event_id}/odds/:
    get:
      operationId: events_odds_retrieve
      description: Get odds and markets for a specific event.
      parameters:
      - in: path
        name: event_id
        schema:
          type: integer
        required: true
      tags:
      - Betting
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventOddsResponse'
          description: ''
  /api/schema/:
    get:
      operationId: schema_retrieve
      description: |-
        OpenApi3 schema for this API. Format can be selected via content negotiation.

        - YAML: application/vnd.oai.openapi
        - JSON: application/vnd.oai.openapi+json
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - json
          - yaml
      - in: query
        name: lang
        schema:
          type: string
          enum:
          - af
          - ar
          - ar-dz
          - ast
          - az
          - be
          - bg
          - bn
          - br
          - bs
          - ca
          - ckb
          - cs
          - cy
          - da
          - de
          - dsb
          - el
          - en
          - en-au
          - en-gb
          - eo
          - es
          - es-ar
          - es-co
          - es-mx
          - es-ni
          - es-ve
          - et
          - eu
          - fa
          - fi
          - fr
          - fy
          - ga
          - gd
          - gl
          - he
          - hi
          - hr
          - hsb
          - hu
          - hy
          - ia
          - id
          - ig
          - io
          - is
          - it
          - ja
          - ka
          - kab
